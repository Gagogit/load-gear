# LOAD-GEAR application configuration
# Override with environment variables: DATABASE_URL

database:
  url: "postgresql+psycopg://postgres:postgres@localhost:5432/loadgear"
  echo: false
  pool_size: 5

server:
  host: "0.0.0.0"
  port: 8000
  reload: true
  log_level: "info"

storage:
  backend: "local"
  base_path: "storage"
